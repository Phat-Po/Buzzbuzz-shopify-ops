# BuzzBuzz 日本代購運費與手續費
# 供應商：干森株式会社
# 最後更新：2026-07-08

# ============================================================
# 匯率
# ============================================================
exchange_rate:
  jpy_to_twd: 0.209          # ¥1 = NT$0.209（約 NT$1 ≈ ¥4.78）
  note: "每期匯率可能變動，以上游當期公告為準"

# ============================================================
# 代購手續費（階梯費率，乘上日幣原價）
# ============================================================
service_fee:
  currency: JPY
  tiers:
    - range: [0, 5000]
      multiplier: 1.25
    - range: [5001, 10000]
      multiplier: 1.22
    - range: [10001, 20000]
      multiplier: 1.20
    - range: [20001, 30000]
      multiplier: 1.18
    - range: [30001, 999999]
      multiplier: 1.15
  minimum_fee: 300           # 最低手續費 ¥300
  note: "手續費 = max(日幣原價 × 費率, ¥300)"

# ============================================================
# 包稅空運運費（依實重，不收材積）
# ============================================================
shipping:
  currency: JPY
  method: "包稅空運"
  weight_basis: "實重"       # 依實際重量計費，非材積重
  includes:
    - "國際運費"
    - "關稅"
    - "台灣國內配送運費"
  tiers:
    - weight: [0, 1.0]
      cost: 1000
    - weight: [1.1, 1.5]
      cost: 1500
    - weight: [1.6, 2.0]
      cost: 2000
    - weight: [2.1, 2.5]
      cost: 2500
    - weight: [2.6, 3.0]
      cost: 3000
  per_extra_05kg: 500        # 超過 3.0 kg，每 0.5 kg 加收 ¥500
  note: "無隱藏費用。超過 3.0 kg 線性疊加。"

# ============================================================
# 供應商資訊
# ============================================================
supplier:
  company: "干森株式会社"
  bank: "合作金庫銀行五洲分行 (006)"
  carriers:
    - "SAGAWA (佐川急便)"
    - "YAMATO (黑貓宅急便)"

# ============================================================
# D-3 淨利計算公式
# ============================================================
#
#   總成本 (TWD) = (日幣原價 × service_fee_multiplier + 運費) × 0.209
#   淨利 (TWD)   = 售價 - 總成本
#   毛利率        = 淨利 / 售價
#
# 範例：
#   商品日幣原價 ¥10,000，重量 1.2 kg，台灣售價 NT$3,500
#   手續費 = ¥10,000 × 1.20 = ¥2,000（手續費部分為 ¥2,000）
#   總日幣成本 = ¥10,000 + ¥2,000 + ¥1,500(運費) = ¥13,500
#   總台幣成本 = ¥13,500 × 0.209 = NT$2,822
#   淨利 = NT$3,500 - NT$2,822 = NT$678
#   毛利率 = 678/3500 = 19.4%

# ============================================================
# 快速試算表（常見價位帶，含手續費+1kg運費）
# ============================================================
quick_reference:
  - item_price_jpy: 2000
    weight_kg: 0.5
    fee_multiplier: 1.25
    shipping_jpy: 1000
    total_cost_jpy: 3500
    total_cost_twd: 732
