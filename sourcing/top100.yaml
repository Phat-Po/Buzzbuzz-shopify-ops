# 定價策略
pricing_strategy:
  穩定周轉款:
    margin: 20-30%
    examples: Mont-bell、Snow Peak鈦杯、柳宗理、Zojirushi、Origami、Hario
    approach: 主打周轉速度，不追高毛利，折扣季批量進
  稀缺高毛利款:
    margin: 35-60%
    examples: BAO BAO限定色、Yamatomichi、Human Made、WTAPS、TNF Purple Label、Pokemon Center限定
    approach: 主攻限定與日本獨家，預購制為主，嚴控庫存
  高單價指定代購:
    margin: 固定服務費
    examples: Grand Seiko、Arai、Shoei、Vermicular、Honma Golf
    approach: 訂金+實報實銷+固定服務費，不建議囤貨

# 禁止 / 高風險品項
prohibited:
  - 肉製品（肉鬆、肉乾、肉塊）— 罰金 NT$200,000 起
  - 電子菸、未核准加熱菸 — 台灣海關嚴查
  - 藥品、過量保健食品 — 需事前確認品項與數量上限

high_risk:
  - 液體香水大量進口 — 需申報
  - 刀具大量寄送 — 需特殊包裝
  - 高單價腕錶 — 需逐款確認保固

# 起步策略
startup_strategy:
  first_wave:
    - BAO BAO
    - Porter
    - Mont-bell
    - Snow Peak
    - 鐵道模型
    - 咖啡器具
  sku_per_line: 5-8
  test_period: 30天
  metric: 詢問量與成交率
