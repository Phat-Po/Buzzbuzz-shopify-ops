# --- 商品描述（三段式 Fact-Feel-Trust） ---
description_fact: "CONVERSE TOKYO 為紀念品牌設立10週年推出的別注款 ALL STAR J OX，型號 A2854PSH900。鞋面採用美國工作服用帆布並做洗水加工，呈現做舊質感；內裡印有10週年紀念標誌，鞋舌處為 ALL STAR 與 CONVERSE TOKYO 雙標設計。日本官網定價 ¥19,800（含稅），原產地日本，目前僅推出深藍色，尺碼 22.5cm–25.0cm（US 3.5–6.5，24cm 尺碼官網未提供）。"

description_feel: "深藍帆布搭配洗水做舊處理，比一般全新帆布鞋多了一點穿舊的隨性感，很適合牛仔褲、工裝褲這類美式休閒穿搭，也能壓一下過於甜美的洋裝造型增加街頭感。10週年紀念的內裡標誌和雙標鞋舌是這款最大的收藏亮點，喜歡 Converse 但想找一雙台灣買不到、不會撞鞋的人會特別有感。"

description_trust: "本商品由 BuzzBuzz 直接向 CONVERSE TOKYO 官方網站下單取得，非平行輸入或二手商品，正品保證。採預購直送制，訂單成立後才向日本下單，實際到貨時間依日本出貨與國際配送時程而定。依 CONVERSE TOKYO 官方販售條款，此商品原則上不接受退貨，下單前請務必確認尺寸與顏色；商品到貨如有明顯瑕疵或誤送，請於收到後盡快與我們聯繫。"

