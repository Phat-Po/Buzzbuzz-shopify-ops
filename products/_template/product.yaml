# BuzzBuzz 產品資料檔
# 編輯此檔案後，請 Claude 檢查或推送到 Shopify
#
# 狀態說明：
#   draft    — 剛開始填寫，資訊不完整
#   review   — 已填完，待你審核
#   ready    — 審核通過，可以推送
#   published — 已推送到 Shopify

# === 基本資訊 ===
status: draft              # draft | review | ready | published
brand_jp: ""               # 品牌日文名（例: イッセイミヤケ）
brand_en: ""               # 品牌英文名（例: ISSEY MIYAKE）
product_name: ""           # 商品名稱（繁中，例: BAO BAO Lucent 三角托特包）
product_type: ""           # 商品類型：包袋 / 潮流服飾 / 戶外運動 / 收藏玩具 / 咖啡器具 / 廚房生活 / 腕錶配件 / 生活美妝 / 文具選品
shopify_category: ""       # Shopify 產品類別（例: 服裝與配件 > 手提包）

# === 價格 ===
cost_jpy: 0                # 日本進價（日元）
price_twd: 0               # 售價（台幣）
price_tw_ref: 0            # 台灣參考價（百貨/選物店售價，作為價差對比）
price_gap_note: ""         # 價差說明（例: 台灣百貨約 NT$12,000，本店現省 NT$4,000+）

# === 規格 ===
variants:
  - option: ""             # 選項名稱（例: 顏色）
    values: []             # 選項值列表（例: ["黑", "白", "限定藍"]）
  - option: ""             # 選項名稱（例: 尺寸）
    values: []             # 選項值列表（例: ["S", "M", "L"]）

material: ""               # 材質（例: 100% 綿羊皮 / 500D Cordura 防潑水尼龍）
dimensions: ""             # 尺寸 長x寬x高 cm（例: 30 x 12 x 25）
weight_g: 0                # 重量（克）
country_of_origin: 日本    # 原產國

# === 標籤與屬性 ===
japan_exclusive: false     # 日本限定款？
season: ""                 # 適用季節（春/夏/秋/冬/全年）
gender: ""                 # Men / Women / Unisex
style_tags: []             # 風格標籤（例: [極簡, 機能, 街頭, 精品, 文青, 戶外]）

# === 庫存狀態 ===
stock_status: in_stock     # in_stock | pre_order | out_of_stock
sourcing_status: available # available | limited | pre_order_only

# ============================================
# ▼ 以下由 Claude 填寫（AI 生成繁中內容）
#
# ⚠️ 供應鏈保密：以下所有欄位（含 FAQ、price_gap_note、jsonld）最終都會出現在
# Shopify 商品頁或 metafields，等於是公開資訊（甚至會被 AI 購物助手讀取）。
# 絕對不能寫「向官網下單」「官網缺貨/現貨」「台灣沒有官方或代理通路」這類會
# 洩露進貨來源、庫存監控方式、或競業分析結論的句子。這些是操作者的商業機密，
# 不是給客人看的。庫存問題（例如某個尺碼缺貨）直接用 variants/stock_status
# 反映（缺貨的選項就不要列進 variants），不要在文案裡解釋「為什麼」。
# scripts/check.py 會自動掃描這類用語，但不要只靠工具擋，寫的時候就要避免。
# ============================================

# --- SEO 與頁面標題 ---
title_zh: ""               # 繁中標題公式：[日本品牌] [商品類型] [關鍵屬性] [差異點] | BuzzBuzz 日本選物
                           # 例: 日本 BAO BAO ISSEY MIYAKE Lucent 三角托特包 M 號 限定色 | BuzzBuzz 日本選物

seo_title: ""              # SEO 標題（≤60 字，含關鍵詞，給 google.com.tw 看）
seo_meta: ""               # SEO meta description（≤160 字，含價差/日本直送等銷售點）

# --- 商品描述（三段式 Fact-Feel-Trust） ---
description_fact: ""       # Fact 段（60-100 字）：材質、尺寸、重量、日本售價、台灣參考價、產地
description_feel: ""       # Feel 段（100-200 字）：穿搭建議、使用場景、適合風格、誰會喜歡
description_trust: ""      # Trust 段（50-100 字）：正品保證、日本直送、退換貨政策、購買須知

# --- 圖片 Alt Text（每張圖都要有） ---
alt_texts: {}              # { "檔名.jpg": "繁中描述", ... }
                           # 例: { "front.jpg": "BAO BAO 黑色三角托特包 白背景正面照" }

# --- FAQ（至少 3 組，AI 搜尋特別喜歡引用 FAQ） ---
faq: []                    # - q: "這個包包台灣專櫃賣多少？"
                           #   a: "台灣 ISSEY MIYAKE 專櫃售價約 NT$XX,XXX，本店日本直送只要 NT$XX,XXX。"

# --- Shopify 標籤（namespace:value 格式，給 AI agent 讀的） ---
tags: []                   # - brand:baobao-isseymiyake
                           # - category:bag
                           # - style:minimal
                           # - origin:japan
                           # - gender:women

# --- 結構化資料（JSON-LD Schema） ---
jsonld_product: ""         # Product + Offer + Brand schema（JSON 字串）
jsonld_faq: ""             # FAQPage schema（JSON 字串）

# --- 圖片清單 ---
images: []                 # 相對路徑 ["images/photo1.jpg", "images/photo2.jpg"]

# ============================================
# ▼ 發布記錄（由 scripts/push.py 自動寫入，勿手動編輯）
# ============================================
published:
  shopify_id: ""
  shopify_url: ""
  shopify_status: ""       # draft / active
  published_at: ""         # ISO 8601
